name: publish

on:
  release:
    types:
      - published

concurrency:
  # Queue rather than cancel: canceling a half-finished publish (krew index
  # PR) can leave the release partially propagated.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # TEMP: krew publishing disabled. A workflow needs at least one job, so this
  # no-op stands in while the krew job below is commented out.
  noop:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "krew publishing temporarily disabled"

