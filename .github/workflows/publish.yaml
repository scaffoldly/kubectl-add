name: publish

on:
  release:
    types:
      - published

concurrency:
  # Queue rather than cancel: canceling a half-finished publish (krew index
  # PR) can leave the release partially propagated.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  krew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Renders .krew.yaml with the release's archives + checksums and opens a
      # version-bump PR against kubernetes-sigs/krew-index. The first
      # submission (adding the plugin) is human-reviewed by krew maintainers.
      - uses: rajatjindal/krew-release-bot@c970b8a8f6dbc2f2285a26e3ae160903b87002c3 # v0.0.51
