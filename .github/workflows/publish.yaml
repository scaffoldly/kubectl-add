name: publish

on:
  release:
    types:
      - published

concurrency:
  # Queue rather than cancel: canceling a half-finished publish (krew index
  # PR) can leave the release partially propagated.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  krew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Renders .krew.yaml with the release's archives + checksums and opens a
      # version-bump PR against kubernetes-sigs/krew-index. The first
      # submission (adding the plugin) is human-reviewed by krew maintainers.
      - uses: rajatjindal/krew-release-bot@c970b8a8f6dbc2f2285a26e3ae160903b87002c3 # v0.0.51

  # Regenerate the Homebrew tap formula from this release's archives + their
  # sha256s and push it to scaffoldly/homebrew-tap. Skips cleanly until the
  # HOMEBREW_TAP_TOKEN secret (a PAT with push access to the tap) is set.
  homebrew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: render and push formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN unset; skipping tap update"
            exit 0
          fi
          packaging/homebrew/render.sh "$TAG" > kubectl-add.rb
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/scaffoldly/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp kubectl-add.rb tap/Formula/kubectl-add.rb
          cd tap
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Formula/kubectl-add.rb
          git diff --cached --quiet || git commit -m "kubectl-add ${TAG}"
          git push
