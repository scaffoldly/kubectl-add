name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yaml
      - cmd/**
      - lib.go
      - v1alpha1/**
      - go.*
    tags:
      - v*
  # No pull_request trigger: the draft is push-gated, so a PR build can't
  # release, and ci.yml already validates that the code compiles.

concurrency:
  # Queue rather than cancel: a canceled run mid-publish can strand a
  # half-populated draft release or leave assets unsigned.
  cancel-in-progress: false
  group: ${{ github.workflow }}--${{ github.ref }}

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      draft-release-name: ${{ steps.create-draft-release.outputs.draft-release-name }}
    permissions:
      contents: write
    steps:
      - if: github.event_name == 'push'
        id: create-draft-release
        uses: int128/go-release-action/create-draft-release@9e1d6ec29fc6ffc2ba55f631baf4a73017d228e1 # v2.5.0

  build:
    needs: create
    strategy:
      matrix:
        platform:
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: arm64
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: arm
          - runs-on: macos-latest
            GOOS: darwin
            GOARCH: amd64
          - runs-on: macos-latest
            GOOS: darwin
            GOARCH: arm64
          - runs-on: windows-latest
            GOOS: windows
            GOARCH: amd64
          - runs-on: windows-latest
            GOOS: windows
            GOARCH: arm64
    runs-on: ${{ matrix.platform.runs-on }}
    env:
      GOOS: ${{ matrix.platform.GOOS }}
      GOARCH: ${{ matrix.platform.GOARCH }}
      CGO_ENABLED: 0
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      # go-release-action archives a pre-built binary and uploads it — it does
      # not build, and has no ldflags input — so build here, cross-compiling
      # per GOOS/GOARCH with the version injected. -s -w strip the symbol table
      # and DWARF; Version is the tag (a semver, for self-update comparison).
      # No -o: `go build` names the binary kubectl-add (kubectl-add.exe on
      # windows), which is what the action expects.
      - run: >-
          go build
          -ldflags "-s -w
          -X github.com/scaffoldly/kubectl-add/v1alpha1/version.Version=${{ needs.create.outputs.draft-release-name }}
          -X github.com/scaffoldly/kubectl-add/v1alpha1/version.Commit=${{ github.sha }}"
          ./cmd/kubectl-add
      - uses: int128/go-release-action@9e1d6ec29fc6ffc2ba55f631baf4a73017d228e1 # v2.5.0
        with:
          binary: kubectl-add
          release-name: ${{ needs.create.outputs.draft-release-name }}

  # After every platform archive is uploaded to the draft, sign each one:
  # keyless cosign (proves who published) plus SLSA build provenance (attests
  # how/where it was built). Verification recipes live in SECURITY.md.
  sign:
    needs: [create, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # download + upload release assets
      id-token: write # cosign keyless signing + provenance OIDC
      attestations: write # SLSA build provenance
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.create.outputs.draft-release-name }}
    steps:
      - name: download release archives
        run: |
          mkdir -p dist
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" --dir dist --pattern '*'

      - name: attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*

      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: sign archives and upload bundles
        run: |
          set -euo pipefail
          # cosign writes each .sigstore next to its archive; attestation
          # already ran, so dist/ still holds only the archives here.
          for f in dist/*; do
            cosign sign-blob --yes --bundle "${f}.sigstore" "$f"
          done
          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" dist/*.sigstore
