apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ./base

resources:
  - ./configmap.yaml
  - https://github.com/scaffoldly/kubectl-add.git//test/e2e/kustomization/addons?ref=main

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nginx
        labels:
          e2e: bases
